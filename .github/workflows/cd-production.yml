name: CD - Production

on:
  workflow_dispatch:
    inputs:
      skip-smoke-tests:
        description: 'Skip smoke tests after deployment'
        required: false
        default: 'false'
        type: boolean

jobs:
  check:
    name: Infrastructure Check
    runs-on: ubuntu-latest
    steps:
      - name: Azure not provisioned
        run: |
          echo "============================================"
          echo "  CD - Production: Azure Not Provisioned"
          echo "============================================"
          echo ""
          echo "Azure infrastructure is not configured yet."
          echo "This workflow will become active once the"
          echo "following secrets are set:"
          echo ""
          echo "  - ACR_LOGIN_SERVER"
          echo "  - ACR_USERNAME"
          echo "  - ACR_PASSWORD"
          echo "  - AZURE_CREDENTIALS"
          echo "  - AZURE_RESOURCE_GROUP"
          echo "  - AZURE_WEBAPP_NAME"
          echo "  - AZURE_ADMIN_WEBAPP_NAME"
          echo ""
          echo "Skipping all deployment steps."
